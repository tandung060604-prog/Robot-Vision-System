<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Robot Dashboard</title>
    <style>
        :root { --bg: #0b0b0d; --card: #161618; --blue: #007bff; --green: #28a745; --yellow: #ffc107; --red: #dc3545; --term: #00ff41; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .dashboard { display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px; width: 98%; max-width: 1550px; }
        .video-box { background: #000; border: 1px solid #333; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .card { background: var(--card); padding: 25px; border-radius: 18px; border-left: 6px solid var(--blue); margin-bottom: 20px; position: relative; }
        .session-tag { position: absolute; top: 10px; right: 20px; background: var(--blue); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.8rem;}
        .control-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        button { padding: 18px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .btn-blue { background: var(--blue); color: white; } .btn-green { background: var(--green); color: white; }
        .btn-yellow { background: var(--yellow); color: black; } .btn-red { background: var(--red); color: white; }
        button:disabled { opacity: 0.1; cursor: not-allowed; }
        .terminal { background: #000; color: var(--term); font-family: 'Consolas', monospace; height: 320px; overflow-y: auto; padding: 15px; border-radius: 12px; border: 1px solid #222; font-size: 0.85rem; }
        .task-card { background: #222; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; border-right: 6px solid #444; }
        .active { border-right-color: var(--green); background: rgba(40,167,69,0.1); animation: pulse 2s infinite; }
        @keyframes pulse { 50% { opacity: 0.7; } }
    </style>
</head>
<body>
    <h1>Industrial Robot AI Center</h1>
    <div class="dashboard">
        <div class="left">
            <div class="video-box"><img id="feed" src="" style="width:100%; min-height:500px;" alt="OFFLINE"></div>
            <div class="control-grid">
                <button class="btn-blue" id="b_conn" onclick="connect()">1. Connect</button>
                <button class="btn-green" id="b_scan" onclick="startScan()" disabled>2. Scan New</button>
                <button class="btn-yellow" id="b_conf" onclick="confirm()" disabled>3. Confirm</button>
                <button class="btn-red" onclick="reset()">⚠ Reset</button>
            </div>
            <button onclick="complete()" style="width:100%; margin-top:12px; background:#333; color:white; padding:18px; border-radius:12px; font-weight:bold;">▶ GIẢ LẬP: ĐÃ THẢ XONG 1 KHỐI</button>
        </div>
        <div class="right">
            <div class="card" style="border-left-color: var(--green);">
                <div class="session-tag" id="session_id">PHIÊN: 0</div>
                <h3>⚡ PERFORMANCE</h3>
                <span>Speed: <b id="fps" style="color:var(--term)">0</b> FPS</span>
                <div id="scan_ui" style="display:none; text-align:center; color:var(--yellow); font-weight:bold; margin-top:10px;">ĐANG QUÉT: <span id="timer" style="font-size:2rem">0.0</span>s</div>
            </div>
            <div class="card">
                <h3>📦 ACTIVE TASK QUEUE</h3>
                <div id="queue">Chờ dữ liệu...</div>
            </div>
            <div class="card" style="border-left-color: var(--red);">
                <h3>📜 SYSTEM TERMINAL</h3>
                <div id="logs" class="terminal"></div>
            </div>
        </div>
    </div>
    <script>
        async function connect() {
            const res = await fetch('/api/connect', {method:'POST'});
            if((await res.json()).status==='ok') {
                document.getElementById('feed').src = "/video_feed";
                document.getElementById('b_scan').disabled = false;
                setInterval(updateUI, 400);
            }
        }
        async function startScan() {
            const res = await fetch('/api/start_scan', {method:'POST'});
            const data = await res.json();
            if(data.status === 'error') alert(data.msg);
        }
        async function confirm() {
            const res = await fetch('/api/confirm', {method:'POST'});
            const data = await res.json();
            if(data.status === 'error') alert(data.msg);
        }
        async function complete() { await fetch('/api/complete_task', {method:'POST'}); }
        async function reset() { if(confirm("Xóa phiên cũ?")) await fetch('/api/reset_session', {method:'POST'}); }

        async function updateUI() {
            try {
                const res = await fetch('/api/get_status');
                const data = await res.json();
                document.getElementById('fps').innerText = data.fps;
                document.getElementById('timer').innerText = data.countdown;
                document.getElementById('scan_ui').style.display = data.is_scanning ? "block" : "none";
                document.getElementById('session_id').innerText = "PHIÊN: " + data.session_id;
                document.getElementById('logs').innerHTML = data.logs.map(l => `<div>> ${l}</div>`).join('');

                // Khóa nút Scan nếu hàng đợi còn vật
                document.getElementById('b_scan').disabled = (data.task_queue.length > 0 || data.is_scanning);

                const q = document.getElementById('queue');
                if(data.is_confirmed && data.task_queue.length > 0) {
                    q.innerHTML = data.task_queue.map((t, i) => `
                        <div class="task-card ${i===0?'active':''}">
                            <span><b>${t.color.toUpperCase()}</b></span>
                            <span style="color:var(--yellow)">📍 ${t.location}</span>
                        </div>`).join('');
                } else if(!data.is_scanning && Object.keys(data.temp_map).length > 0 && !data.is_confirmed) {
                    let h = "<b>PREVIEW MISSION:</b><br>";
                    for(let k in data.temp_map) h += `🔹 ${k.toUpperCase()} -> ${data.temp_map[k]}<br>`;
                    q.innerHTML = h; document.getElementById('b_conf').disabled = false;
                } else if(data.is_confirmed && data.task_queue.length === 0) {
                    q.innerHTML = "<p style='color:var(--green); text-align:center;'>✔ PHIÊN HOÀN TẤT.</p>";
                    document.getElementById('b_conf').disabled = true;
                } else { q.innerHTML = "Sẵn sàng quét mới..."; }
            } catch(e) {}
        }
    </script>
</body>
</html>
